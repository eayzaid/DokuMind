version: '3.8'

services:
  postgres:
    image: 'postgres:15'
    container_name: dokumind-postgres
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_PASSWORD: YOUR_POSTGRES_PASSWORD
      POSTGRES_USER: myuser
    ports:
      - '5432:5432'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: 'minio/minio:latest'
    container_name: dokumind-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: YOUR_MINIO_ROOT_PASSWORD
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: dokumind-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./RAGPipeline/chroma_db_data:/chroma/chroma
    restart: unless-stopped

  ragpipeline:
    build:
      context: ./RAGPipeline
      dockerfile: Dockerfile
    container_name: dokumind-ragpipeline
    environment:
      GROQ_API_KEY: "YOUR_GROQ_API_KEY"
      GROQ_MODEL: "YOUR_GROQ_MODEL"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
    ports:
      - "8001:8000"
    volumes:
      - ./RAGPipeline/chroma_db:/app/chroma_db
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped

  platformgateway:
    build:
      context: ./PlatformGateway
      dockerfile: Dockerfile
    container_name: dokumind-platformgateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: YOUR_POSTGRES_PASSWORD
      APPLICATION_SECRET_REFRESH_TOKEN: "YOUR_REFRESH_TOKEN_SECRET"
      APPLICATION_SECRET_ACCESS_TOKEN: "YOUR_ACCESS_TOKEN_SECRET"
      SPRING_MAIL_USERNAME: "YOUR_EMAIL_USERNAME"
      SPRING_MAIL_PASSWORD: "YOUR_EMAIL_PASSWORD"
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_NAME: admin
      MINIO_ACCESS_SECRET: YOUR_MINIO_ACCESS_SECRET
      RAG_PIPELINE_URL: http://ragpipeline:8000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ragpipeline:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: dokumind-frontend
    ports:
      - "80:80"
    depends_on:
      platformgateway:
        condition: service_started
    restart: unless-stopped
